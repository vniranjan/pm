<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Management MVP - Backend Hello</title>
    <style>
      :root {
        --accent-yellow: #ecad0a;
        --primary-blue: #209dd7;
        --secondary-purple: #753991;
        --navy-dark: #032147;
        --gray-text: #888888;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f6f8fc;
        color: var(--navy-dark);
      }

      .page {
        max-width: 840px;
        margin: 48px auto;
        padding: 24px;
      }

      .card {
        background: #ffffff;
        border: 1px solid rgba(3, 33, 71, 0.12);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 28px rgba(3, 33, 71, 0.1);
      }

      h1 {
        margin: 0 0 8px;
        color: var(--navy-dark);
      }

      p {
        margin-top: 0;
        color: var(--gray-text);
      }

      button {
        border: 0;
        border-radius: 999px;
        background: var(--secondary-purple);
        color: #fff;
        padding: 10px 16px;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        filter: brightness(1.05);
      }

      .status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(32, 157, 215, 0.35);
        background: rgba(32, 157, 215, 0.08);
        color: var(--primary-blue);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>FastAPI backend is running</h1>
        <p>
          This is the Part 2 hello page. Click the button to call
          <code>/api/health</code>.
        </p>
        <button id="check-health" type="button">Call API</button>
        <pre id="status" class="status">Waiting for API call...</pre>
      </section>
    </main>

    <script>
      const button = document.getElementById("check-health");
      const status = document.getElementById("status");

      button.addEventListener("click", async () => {
        status.textContent = "Calling /api/health ...";
        try {
          const response = await fetch("/api/health");
          const json = await response.json();
          status.textContent = JSON.stringify(json, null, 2);
        } catch (error) {
          status.textContent = `Request failed: ${error}`;
        }
      });
    </script>
  </body>
</html>
